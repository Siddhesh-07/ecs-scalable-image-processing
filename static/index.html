<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Scale Image Processor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }

        .upload-box {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #0066cc;
            background: #f0f7ff;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        button:disabled {
            background: #ccc;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

<h2>📷 Cloud Image Processor</h2>

<p>
    Upload a high-resolution image. It will upload directly to Amazon S3 using a
    pre-signed URL, then an ECS worker will resize it in the background.
</p>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <span id="uploadLabel">Click to select an image</span>
    <input type="file" id="fileInput" accept="image/*">
</div>

<button id="uploadBtn" onclick="startProcess()" disabled>
    Upload & Process
</button>

<div id="status"></div>

<script>

const fileInput = document.getElementById("fileInput");
const uploadLabel = document.getElementById("uploadLabel");
const uploadBtn = document.getElementById("uploadBtn");
const statusDiv = document.getElementById("status");

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        uploadLabel.innerText = `Selected: ${fileInput.files[0].name}`;
        uploadBtn.disabled = false;
    }
});

async function startProcess() {

    const file = fileInput.files[0];

    if (!file) return;

    uploadBtn.disabled = true;

    statusDiv.innerHTML = "🔄 Step 1: Requesting secure upload URL...";

    try {

        // ✅ Relative URL (works behind ALB)
        const apiResponse = await fetch(
            `/generate-upload-url?filename=${encodeURIComponent(file.name)}`
        );

        if (!apiResponse.ok) {
            throw new Error("Failed to get upload URL");
        }

        const data = await apiResponse.json();

        const uploadUrl = data.upload_url;
        const fileKey = data.file_key;

        statusDiv.innerHTML = "📤 Step 2: Uploading directly to Amazon S3...";

        const s3Response = await fetch(uploadUrl, {
            method: "PUT",
            headers: {
                "Content-Type": file.type
            },
            body: file
        });

        if (!s3Response.ok) {
            throw new Error("S3 upload failed.");
        }

        statusDiv.innerHTML =
            "⏳ Step 3: Waiting for ECS worker to process image...";

        pollForThumbnail(fileKey);

    } catch (err) {

        console.error(err);

        statusDiv.innerHTML = `❌ Error: ${err.message}`;

        uploadBtn.disabled = false;
    }
}

async function pollForThumbnail(fileKey) {

    const interval = setInterval(async () => {

        try {

            // ✅ Relative URL (works behind ALB)
            const response = await fetch(
                `/get-download-url?file_key=${encodeURIComponent(fileKey)}`
            );

            if (!response.ok) {
                return;
            }

            const data = await response.json();

            clearInterval(interval);

            statusDiv.innerHTML = `
                <div style="margin-top:20px;
                            padding:15px;
                            border-radius:6px;
                            background:#f4fbf4;
                            border:1px solid #28a745;">

                    <p style="color:#28a745;font-weight:bold;">
                        🎉 Thumbnail Ready!
                    </p>

                    <img
                        src="${data.download_url}"
                        alt="Thumbnail"
                        style="
                            max-width:180px;
                            display:block;
                            margin:10px auto;
                            border-radius:5px;
                            border:1px solid #ddd;
                        ">

                    <a
                        href="${data.download_url}"
                        download="thumbnail.jpg"
                        style="
                            display:inline-block;
                            margin-top:10px;
                            background:#28a745;
                            color:white;
                            text-decoration:none;
                            padding:10px 15px;
                            border-radius:5px;
                        ">
                        Download Thumbnail
                    </a>

                </div>
            `;

            uploadBtn.disabled = false;

        } catch (err) {
            // Keep polling until thumbnail exists.
        }

    }, 2000);
}

</script>

</body>
</html>
